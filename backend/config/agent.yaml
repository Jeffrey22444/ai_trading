# Agent Configuration

agent:
  # LLM Configuration - Compatible with any OpenAI API format
  model_name: "deepseek-chat"  # Model name (gpt-4o, claude-3-5-sonnet, deepseek-chat, qwen-plus, etc.)
  base_url: "https://api.deepseek.com/v1"  # API base URL (null for OpenAI, or custom like "https://api.deepseek.com/v1")
  api_key: "${OPENAI_API_KEY}"  # API key environment variable
  
  # Trading Configuration
  decision_interval: 180  # seconds between decisions
  symbols:
    - BTC
    - ETH
    - SOL
  timeframes:
    - "3m"
    - "1h"
    - "4h"
  
  # 用户可配置的交易策略（会被数据库覆盖）
  trading_strategy: |
    # 交易策略 v2：代码定量，AI 只确认或 HOLD

    你是一名严守纪律的加密永续合约交易员，目标是最大化「风险调整后收益」，不是追求每轮都交易。本文仅供参考，不构成投资或法律建议。加密永续合约风险极高，可能爆仓亏光本金；没有明确优势时必须 HOLD。

    ## 一、你与系统的分工
    系统后端会先用纯代码计算量化护栏，并在提示词中提供给你：
    1. 多维度评分：LONG/SHORT/NEUTRAL、总分、D1-D5 明细。
    2. 客观止损止盈：ATR 止损、摆动高低点、2:1 止盈。
    3. Kelly 仓位：代码根据评分映射胜率、盈亏比、可用余额、分数 Kelly、20% 硬上限和 100 美元下限计算 position_size_usd。
    4. 杠杆档位：代码根据评分和配置上限计算 leverage。

    你负责读图复核和纪律判断。你可以把系统允许的开仓改成 HOLD，但不得反向开仓，不得改写 position_size_usd、stop_loss_price、take_profit_price 或 leverage。

    ## 二、强制 HOLD 条件
    任一条件满足时必须 HOLD：
    1. 系统量化护栏 action_allowed=false。
    2. direction_bias=NEUTRAL。
    3. total_score < 6.0。
    4. Kelly 计算后 position_size_usd < 100 美元。
    5. 止损止盈方向不正确，或盈亏比不足 2:1。
    6. 已有同向持仓且没有明确失效条件，不重复加仓。
    7. 你无法用系统给出的数据解释这笔交易的优势。

    ## 三、方向纪律
    1. 系统判定 LONG 时，你只能 OPEN_LONG 或 HOLD。
    2. 系统判定 SHORT 时，你只能 OPEN_SHORT 或 HOLD。
    3. 系统判定 NEUTRAL 时，只能 HOLD。
    4. ETH 和 SOL 是核心高流动性资产，不按普通山寨币处理；BTC 只作为市场风险背景，不对 ETH/SOL 进行硬性方向否决。

    ## 四、止损止盈纪律
    1. 开多：stop_loss_price 必须低于当前价，take_profit_price 必须高于当前价。
    2. 开空：stop_loss_price 必须高于当前价，take_profit_price 必须低于当前价。
    3. 止损来自系统计算的 ATR 或摆动高低点，你不得编造支撑阻力位。
    4. 如果你认为系统止损不合理，正确动作是 HOLD，不是自行改价。

    ## 五、杠杆纪律
    杠杆只用于资金效率，不用于放大单笔敞口。position_size_usd 是市场敞口，已经由 Kelly 和 20% 硬上限约束；leverage 只决定占用多少保证金。不得因为看起来有机会而要求提高杠杆或扩大仓位。

    ## 六、平仓纪律
    每轮先检查现有持仓：
    - 多头持仓：若 1h/4h 趋势转空、价格跌破关键支撑、MACD 明显转弱，可 CLOSE_LONG。
    - 空头持仓：若 1h/4h 趋势转多、价格突破关键阻力、MACD 明显转强，可 CLOSE_SHORT。
    - 未触发失效条件时，不要因短期噪音乱平仓，让止损止盈工作。

    ## 七、reasoning 必须包含
    对每个 symbol，reasoning 必须写清：
    1. 系统评分：direction_bias、total_score、D1-D5 明细。
    2. 你为什么接受开仓，或为什么否决为 HOLD。
    3. 使用的系统仓位、杠杆、止损、止盈。
    4. 止损来源：ATR 还是摆动高低点。
    5. 如果止损触发，约亏多少美元或占账户多少比例。
    6. 失效条件：什么市场信号说明判断错了。

    最高原则：后端代码负责定量，AI 负责复核纪律。宁可错过，不可乱做。

# Exchange Configuration
exchange:
  name: "hyperliquid"
  wallet_address: "${HYPERLIQUID_WALLET_ADDRESS}"
  private_key: "${HYPERLIQUID_PRIVATE_KEY}"
  testnet: true
  allow_live_trading: false
  
  # Futures trading settings (for CCXT)
  default_leverage: 1
  margin_mode: "cross"  # cross or isolated
  enable_rate_limit: true
  timeout: 10000  # milliseconds
  retries: 3
# Risk Management (these can be overridden in user prompts)
default_risk:
  max_position_size_percent: 0.2  # 20% of available balance per position
  max_daily_loss_percent: 0.05    # 5% max daily loss
                # Maximum leverage
  stop_loss_percent: 0.02         # 2% stop loss

# Quant Strategy Guardrails
kelly:
  fraction: 0.35
  hard_cap: 0.20
  min_position_usd: 100
  payoff_ratio_b: 2.0

leverage:
  max_leverage: 3
  score_to_leverage:
    "6-7": 1
    "7-8": 2
    "8-9": 3
    "9-10": 3
  fraction_by_leverage:
    1: 0.35
    2: 0.35
    3: 0.30
    4: 0.25
    5: 0.25

scoring:
  entry_score_threshold: 6.0
  min_direction_edge: 1.0
  trend_timeframes:
    - "1h"
    - "4h"
  momentum_timeframe: "4h"
  fallback_momentum_timeframe: "1h"
  volatility_timeframe: "4h"
  benchmark_symbol: "BTC"
  core_symbols:
    - BTC
    - ETH
    - SOL
  score_weights:
    D1: 1
    D2: 1
    D3: 1
    D4: 1
    D5: 1
  score_to_winrate:
    "6-7": 0.50
    "7-8": 0.53
    "8-9": 0.56
    "9-10": 0.58
  high_volatility_natr: 5.0
  extreme_volatility_natr: 10.0
  extreme_funding_abs: 0.001

stop:
  timeframe: "4h"
  fallback_timeframe: "1h"
  atr_stop_multiplier: 1.5
  high_volatility_atr_stop_multiplier: 2.0
  swing_lookback: 20
  swing_strength_m: 2
  swing_buffer_atr_fraction: 0.10
  
# Account Snapshot Configuration
account_snapshot:
  enabled: true
  interval_minutes: 15  # Take snapshot every 15 minutes
  keep_days: 90  # Keep snapshots for 90 days

# Logging Configuration
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  save_decisions: true
  save_executions: true
  save_snapshots: true
  
# System Configuration  
system:
  host: "127.0.0.1"
  port: 8000
  max_concurrent_decisions: 1  # Prevent overlapping decisions
