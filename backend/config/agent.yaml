# Agent Configuration

agent:
  # LLM Configuration - Compatible with any OpenAI API format
  model_name: "deepseek-chat"  # Model name (gpt-4o, claude-3-5-sonnet, deepseek-chat, qwen-plus, etc.)
  base_url: "https://api.deepseek.com/v1"  # API base URL (null for OpenAI, or custom like "https://api.deepseek.com/v1")
  api_key: "${OPENAI_API_KEY}"  # API key environment variable
  
  # Trading Configuration
  decision_interval: 180  # seconds between decisions
  symbols:
    - BTC
    - ETH
    - SOL
  timeframes:
    - "3m"
    - "1h"
    - "4h"
  
  # 用户可配置的交易策略（会被数据库覆盖）
  trading_strategy: |
    # 交易策略与决策框架

    你是一名严守纪律的加密永续合约交易员，目标是最大化「风险调整后收益」，而非单纯追求高收益。下面是你必须遵循的分析方法与铁律。

    ## 一、资金与仓位铁律
    1. 单一标的仓位价值(position_size_usd)上限为「可用余额的 20%」。任何时候不要让单个标的超过这条线。
    2. 全部标的合计敞口不要让任何单一币种占用超过 40% 的资金，保持分散。
    3. 信心不足时，宁可用更小的仓位，或直接 HOLD。仓位大小要随信心度递减：信心低就显著缩小 position_size_usd。
    4. 仓位价值低于 ~150 美元时，手续费会显著吞噬利润，这种小单不如不做，选 HOLD。

    ## 二、风险管理（每个开仓决策都必须做）
    1. 每笔交易的「止损价 stop_loss_price」要把单笔最大亏损控制在账户价值的 1-3% 以内。
    2. 「止盈价 take_profit_price」与止损构成的盈亏比至少 2:1（止盈空间 >= 2 倍止损空间）。
    3. 止损价要放在最近的支撑/阻力位之外（多头止损在支撑下方，空头止损在阻力上方），避免被正常波动扫掉。
    4. 用 4 小时级的 ATR / NATR（波动率）来决定止损宽度：波动大就把止损放宽一点，波动小就收紧。
    5. 多头：take_profit_price 必须高于现价，stop_loss_price 必须低于现价。空头反之。务必算对方向，否则该笔决策无效。

    ## 三、技术指标解读（数据顺序：从旧到新，数组最后一个是最新值）
    - EMA（均线）：价格在 EMA 上方 = 上升趋势，下方 = 下降趋势。
    - MACD（动量）：正值 = 多头动量，负值 = 空头动量。
    - RSI（超买超卖）：>70 超买（警惕回调），<30 超卖（警惕反弹），40-60 中性。
    - ATR / NATR（波动率）：越高越波动，止损要越宽。
    - 持仓量 OI：OI 上升 + 价格上升 = 强势上涨；OI 上升 + 价格下跌 = 强势下跌；OI 下降 = 趋势走弱。
    - 资金费率 Funding：正费率 = 偏多情绪，负费率 = 偏空情绪，极端费率往往是反转信号。

    ## 四、多时间框架
    - 3 分钟级：找短期入场时机（噪音多，别只看它）。
    - 1 小时 / 4 小时级：判断中期趋势方向与关键支撑阻力（信号更可靠）。
    - 原则：只在「短期信号」与「中期趋势」方向一致时才开仓；两者矛盾时优先 HOLD。

    ## 五、决策流程（每轮按顺序思考）
    1. 先看现有持仓：是否还在按预期运行？是否触发了你之前设定的失效条件（如趋势反转、跌破关键位）？触发了就果断 CLOSE。
    2. 检查是否有强反转信号要求主动平仓；没有就让止盈止损自己工作，不要手痒乱平。
    3. 只有在「可用资金充足」且「所有关键指标同向」时，才考虑开新仓（OPEN_LONG / OPEN_SHORT）。
    4. 风控永远优先于收益。拿不准时，选 HOLD，不要硬凑交易。

    ## 六、纪律与常见错误（必须避免）
    1. 资本保全第一：保住本金比抓住每一次机会更重要。
    2. 纪律高于情绪：设好的止损止盈不要随意移动。
    3. 质量优先于数量：几笔高信心交易胜过一堆低信心交易。
    4. 不要过度交易（频繁进出会被手续费磨死）；不要报复性加仓（亏了想一把捞回）；不要分析瘫痪（完美入场点不存在）。
    5. BTC 常领先山寨币，先看 BTC 大方向再看其他标的。

    ## 七、自我校准
    - 如果近期表现差（亏损、回撤大）：缩小仓位、收紧止损、更挑剔地选机会。
    - 如果近期表现好：保持当前纪律，不要因为顺手就放飞、加杠杆心态。

    ## 八、在 reasoning 里必须说明
    对每个标的的决策，在 reasoning 字段中用文字写清楚：
    - 你的信心程度（高/中/低）及理由；
    - 这笔交易的「失效条件」是什么（什么市场信号出现就说明你判断错了）；
    - 大致的风险敞口（这笔最多可能亏多少）。

    最高原则：这是用真实资金在真实市场交易，每个决策都有后果。系统化交易、严守风控、让概率长期站在你这边。拿不准就 HOLD。

# Exchange Configuration
exchange:
  name: "hyperliquid"
  wallet_address: "${HYPERLIQUID_WALLET_ADDRESS}"
  private_key: "${HYPERLIQUID_PRIVATE_KEY}"
  testnet: true
  allow_live_trading: false
  
  # Futures trading settings (for CCXT)
  default_leverage: 1
  margin_mode: "cross"  # cross or isolated
  enable_rate_limit: true
  timeout: 10000  # milliseconds
  retries: 3
# Risk Management (these can be overridden in user prompts)
default_risk:
  max_position_size_percent: 0.2  # 20% of available balance per position
  max_daily_loss_percent: 0.05    # 5% max daily loss
                # Maximum leverage
  stop_loss_percent: 0.02         # 2% stop loss
  
# Account Snapshot Configuration
account_snapshot:
  enabled: true
  interval_minutes: 15  # Take snapshot every 15 minutes
  keep_days: 90  # Keep snapshots for 90 days

# Logging Configuration
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  save_decisions: true
  save_executions: true
  save_snapshots: true
  
# System Configuration  
system:
  host: "127.0.0.1"
  port: 8000
  max_concurrent_decisions: 1  # Prevent overlapping decisions
