# Agent Configuration

agent:
  # LLM Configuration - Compatible with any OpenAI API format
  model_name: "deepseek-chat"  # Model name (gpt-4o, claude-3-5-sonnet, deepseek-chat, qwen-plus, etc.)
  base_url: "https://api.deepseek.com/v1"  # API base URL (null for OpenAI, or custom like "https://api.deepseek.com/v1")
  api_key: "${OPENAI_API_KEY}"  # API key environment variable
  
  # Trading Configuration
  decision_interval: 180  # seconds between decisions
  symbols:
    - BTC
    - ETH
    - SOL
  timeframes:
    - "3m"
    - "1h"
    - "4h"
  
  regime_classifier_prompt_template_path: "backend/config/regime_classifier_prompt.md"

# Exchange Configuration
exchange:
  name: "hyperliquid"
  wallet_address: "${HYPERLIQUID_WALLET_ADDRESS}"
  private_key: "${HYPERLIQUID_PRIVATE_KEY}"
  testnet: true
  allow_live_trading: false
  
  # Futures trading settings (for CCXT)
  default_leverage: 1
  margin_mode: "cross"  # cross or isolated
  enable_rate_limit: true
  timeout: 10000  # milliseconds
  retries: 3
# Risk Management (these can be overridden in user prompts)
default_risk:
  max_position_size_percent: 0.2  # 20% of available balance per position
  max_daily_loss_percent: 0.05    # 5% max daily loss
                # Maximum leverage
  stop_loss_percent: 0.02         # 2% stop loss

# Quant Strategy Guardrails
kelly:
  fraction: 0.35
  hard_cap: 0.20
  min_position_usd: 70
  payoff_ratio_b: 2.0

leverage:
  max_leverage: 3
  score_to_leverage:
    "6-7": 1
    "7-8": 2
    "8-9": 3
    "9-10": 3
  fraction_by_leverage:
    1: 0.35
    2: 0.35
    3: 0.30
    4: 0.25
    5: 0.25

execution_safety:
  max_entry_price_drift_pct: 0.003
  max_chase_price_drift_pct: 0.0015

entry_quality:
  enabled: true
  max_rsi_long: 70
  min_rsi_short: 30
  max_price_ema20_distance_atr: 1.2
  require_momentum_not_decaying: true
  use_timeframe_aware_freshness: true
  market_data_age_buffer_seconds: 75
  max_market_data_age_seconds: 300

scoring:
  entry_score_threshold: 6.0
  exit_score_threshold: 5.0
  min_direction_edge: 1.0
  trend_timeframes:
    - "1h"
    - "4h"
  momentum_timeframe: "4h"
  fallback_momentum_timeframe: "1h"
  volatility_timeframe: "4h"
  benchmark_symbol: "BTC"
  core_symbols:
    - BTC
    - ETH
    - SOL
  score_weights:
    D1: 1
    D2: 1
    D3: 1
    D4: 1
    D5: 1
  score_to_winrate:
    "6-7": 0.50
    "7-8": 0.53
    "8-9": 0.56
    "9-10": 0.58
  high_volatility_natr: 5.0
  extreme_volatility_natr: 10.0
  extreme_funding_abs: 0.001

stop:
  timeframe: "4h"
  fallback_timeframe: "1h"
  atr_stop_multiplier: 1.5
  high_volatility_atr_stop_multiplier: 2.0
  swing_lookback: 20
  swing_strength_m: 2
  swing_buffer_atr_fraction: 0.10

regime_execution:
  regime:
    min_confidence: 0.60
    unknown_blocks_entries: true
  scoring:
    q_threshold: 0.65
    d_threshold: 0.60
    d_edge_threshold: 0.60
    weights:
      f1_trend_strength: 0.30
      f2_momentum: 0.25
      f3_volatility_context: 0.25
      f4_entry_timing: 0.20
    ema_fast_window: 20
    ema_slow_window: 50
    slope_lookback_bars: 5
    structure_lookback_bars: 20
    structure_half_window_bars: 10
    roc_window_bars: 10
    atr_window_bars: 14
    atr_percentile_window_bars: 100
    mean_window_bars: 20
    breakout_lookback_bars: 20
    max_mean_distance_atr: 1.5
    max_breakout_distance_atr: 1.0
  risk:
    max_risk_pct: 0.10
    max_trade_risk_pct: 0.02
    max_drawdown_pct: 0.10
    circuit_breaker_drawdown: 0.15
    correlation_cap_pct: 0.04
    regime_weights:
      TREND: 0.50
      BREAKOUT: 0.30
      RANGE: 0.20
  setup:
    pullback_max_ema_distance_atr: 0.75
    breakout_buffer_atr: 0.10
  lifecycle:
    max_hold_seconds_short: 5400
    max_hold_seconds_swing: 604800
    profit_r_threshold: 1.0
    short_trailing_r: 0.5
    swing_trailing_r: 1.0
  orders:
    atr_stop_multiplier_short: 1.0
    atr_stop_multiplier_swing: 2.0
    take_profit_r: 2.0
    min_stop_pct: 0.003
    max_slippage_pct: 0.003
    max_execution_retries: 2
    protection_retry_max: 1

stability_refactor:
  enabled: true
  mode: shadow
  cycle_minutes: 3
  extreme_signal:
    stable_score_min: 8.5
    score_margin_min: 3.0
    min_hold_cycles_for_fast_exit: 2
  regime_stabilization:
    window_cycles: 3
    required_count: 2
    min_average_confidence: 0.70
    unknown_never_forces_exit: true
  score_smoothing:
    method: rolling_median
    window_cycles: 3
  direction_stabilization:
    window_cycles: 3
    required_count: 2
    reversal_margin_min: 2.0
    current_direction_score_max_for_reversal: 5.0
    require_current_score_deterioration: true
  instability_index:
    window_cycles: 3
    high_threshold: 2.0
    entry_threshold_penalty: 1.0
    mark_position_watch: true
    tighten_profit_protection: false
  entry_gate:
    base_stable_score_min: 8.0
    allow_threshold_floor_after_review: 7.0
    score_margin_min: 2.0
    block_if_instability_high: false
    require_position_plan_fields: true
  challenge_engine:
    invalidation_threshold: 6.0
    decay_after_no_evidence_cycles: 2
    decay_amount: 1.0
    max_score: 10.0
    evidence_weights:
      opposite_score_dominance: 2.0
      stable_direction_reversal: 2.0
      active_regime_mismatch: 1.0
      setup_mismatch: 1.0
      adverse_price_near_initial_stop: 2.0
      hard_price_invalidation: 6.0
      time_no_progress: 1.0
  lifecycle:
    SCALP:
      min_hold_cycles: 1
      soft_cooldown_cycles: 1
      expected_review_cycles: 2
      max_hold_cycles_if_no_profit: 10
      breakeven_activation_profit_pct: 0.006
      breakeven_activation_r: 0.75
      trailing_activation_profit_pct: 0.012
      trailing_activation_r: 1.0
      trailing_distance_floor_pct: 0.004
      trailing_atr_multiple: 1.0
    SHORT:
      min_hold_cycles: 3
      soft_cooldown_cycles: 2
      expected_review_cycles: 5
      max_hold_cycles_if_no_profit: 40
      breakeven_activation_profit_pct: 0.010
      breakeven_activation_r: 1.0
      trailing_activation_profit_pct: 0.018
      trailing_activation_r: 1.5
      trailing_distance_floor_pct: 0.007
      trailing_atr_multiple: 1.5
    SWING:
      min_hold_cycles: 10
      soft_cooldown_cycles: 5
      expected_review_cycles: 20
      max_hold_cycles_if_no_profit: 480
      breakeven_activation_profit_pct: 0.015
      breakeven_activation_r: 1.0
      trailing_activation_profit_pct: 0.025
      trailing_activation_r: 2.0
      trailing_distance_floor_pct: 0.012
      trailing_atr_multiple: 2.0
  profit_protection:
    use_atr_adaptive_distance: true
    atr_timeframe: "3m"
    stop_only_moves_favorably: true
  cooldown:
    post_exit_cooldown_cycles: 3
    post_loss_cooldown_cycles: 5
    reverse_block_cycles: 2
    allow_extreme_signal_override: true
  portfolio_guards:
    stoploss_guard:
      enabled: true
      lookback_trades: 5
      stoploss_count_threshold: 4
      cooldown_cycles: 20
    max_drawdown_guard:
      enabled: true
      lookback_trades: 20
      max_drawdown_pct: 0.05
      cooldown_cycles: 40
  
# Account Snapshot Configuration
account_snapshot:
  enabled: true
  interval_minutes: 15  # Take snapshot every 15 minutes
  keep_days: 90  # Keep snapshots for 90 days

# Logging Configuration
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  save_decisions: true
  save_executions: true
  save_snapshots: true
  
# System Configuration  
system:
  host: "127.0.0.1"
  port: 8000
  max_concurrent_decisions: 1  # Prevent overlapping decisions
